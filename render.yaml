# Render blueprint — SupportFlow Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: supportflow-api
    runtime: docker
    plan: starter
    healthCheckPath: /health/ready
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: SWAGGER_ENABLED
        value: true
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: UPLOAD_DIR
        value: storage/attachments
      - key: DATABASE_URL
        fromDatabase:
          name: supportflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
    disk:
      name: supportflow-uploads
      mountPath: /app/storage/attachments
      sizeGB: 1

databases:
  - name: supportflow-db
    plan: starter
    databaseName: supportflow
    user: supportflow
