name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      HUSKY: 0
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supportflow_ci?schema=public
      JWT_SECRET: ci-jwt-secret-with-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-with-at-least-32-chars
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  integration:
    name: Integration tests (E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supportflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d supportflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HUSKY: 0
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supportflow_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/supportflow_test?schema=public
      JWT_SECRET: ci-jwt-secret-with-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret-with-at-least-32-chars
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      RATE_LIMIT_ENABLED: 'false'
      LOG_LEVEL: warn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm prisma:deploy

      - name: Run integration tests (E2E)
        run: pnpm test:integration
