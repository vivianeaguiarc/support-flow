services:
  postgres:
    image: postgres:16-alpine
    container_name: supportflow-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supportflow
    volumes:
      - supportflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d supportflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supportflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supportflow-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supportflow?schema=public
      JWT_SECRET: local-docker-jwt-secret-with-32-chars-min
      JWT_REFRESH_SECRET: local-docker-jwt-refresh-secret-32-chars
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
      RATE_LIMIT_ENABLED: 'true'
      UPLOAD_MAX_SIZE_MB: 10
      UPLOAD_DIR: storage/attachments
      SWAGGER_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      QUEUE_ENABLED: 'true'
      QUEUE_WORKERS_ENABLED: 'true'
    volumes:
      - supportflow_uploads:/app/storage/attachments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  supportflow_postgres_data:
  supportflow_uploads:
