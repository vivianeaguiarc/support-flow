services:
  postgres:
    image: postgres:16-alpine
    container_name: supportflow-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supportflow
    volumes:
      - supportflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d supportflow']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  supportflow_postgres_data:
